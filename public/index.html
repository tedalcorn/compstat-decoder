<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="The NYPD's weekly CompStat crime report, decoded and put in geographic and long-run context. A Vital City project."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Vital City - CompStat Decoder</title>

    <!-- Open Graph / social + Mail rich-link preview. Mail doesn't run JS, so these
         static tags (not the dynamic document.title set in App.js) drive the preview. -->
    <meta property="og:title" content="Vital City - CompStat Decoder" />
    <meta property="og:site_name" content="Vital City" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tedalcorn.org/compstat-decoder" />
    <meta property="og:description" content="The NYPD's weekly CompStat crime report, decoded and put in geographic and long-run context. A Vital City project." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vital City - CompStat Decoder" />
    <meta name="twitter:description" content="The NYPD's weekly CompStat crime report, decoded and put in geographic and long-run context. A Vital City project." />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    -->
  </body>
</html>
